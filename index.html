<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO-DO-LIST</title>
    <link href='https://fonts.googleapis.com/css?family=Baloo' rel='stylesheet'>
    <link href='https://fonts.googleapis.com/css?family=Baloo+Bhaina' rel='stylesheet'>

        <video autoplay muted loop class="fixed right-0 bottom-0 min-w-full min-h-full object-cover z-0">
            <source src="./Chillhop - White Oak.mp4" type="video/mp4">
        </video>

            </div>
        </div>

            </button>

        
            <div class="relative flex-shrink-0" id="customDropdown">
                <button onclick="toggleDropdown()" id="dropdownBtn"
                    class="font-['Baloo_Bhaina'] text-white w-[150px] h-[50px] font-normal text-[18px] rounded-[2px] shadow-xl border-[1px] bg-[#C4BABA5E] border-[#FFFFFFB2] pl-[15px] flex items-center justify-between pr-3">
                    <span id="dropdownLabel">ALL</span>
                    <i id="dropdownIcon" class="fa fa-chevron-down text-white text-[18px] transition-transform duration-100">
                    </i>
                   </button>
                <ul id="dropdownMenu"
                    class="hidden absolute top-[52px] left-0 w-[150px] font-['Baloo_Bhaina'] text-white text-[18px] rounded-[2px] border-[1px] bg-[#C4BABA5E] border-[#FFFFFFB2] shadow-xl z-50">
                    <li onclick="selectFilter('all', 'ALL')"
                        class="px-4 py-2 hover:bg-[#ffffff] hover:text-gray-500  cursor-pointer">ALL</li>
                    <li onclick="selectFilter('complete', 'Completed')"
                        class="px-4 py-2 hover:bg-[#ffffff] hover:text-gray-500 cursor-pointer">Completed</li>
                    <li onclick="selectFilter('incomplete', 'Incomplete')"
                        class="px-4 py-2 hover:bg-[#ffffff] hover:text-gray-500 cursor-pointer">Incomplete</li>
                </ul>
            </div>
        </div>

  
    <ul id="taskList" class="relative z-10 w-full flex flex-col gap-4 mt-10 px-5 max-w-[1000px] mx-auto items-center justify-between"></ul>
    </div>                    

    <script src="script.js"></script>
